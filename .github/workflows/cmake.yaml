name: CMake

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        configuration: [Release, Debug]
        include:
          - triplet: x86-windows
            platform: Win32
          - triplet: x64-windows
            platform: x64
    runs-on: windows-latest

    env:
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Restore from cache and install vcpkg
        id: runvcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitURL: https://github.com/rioki/vcpkg.git
          vcpkgGitCommitId: 62159a45e18f3a9ac0548628dcaf74fcb60c6ff9

      - name: Configure + Build + Install
        uses: lukka/run-cmake@v10
        with:
          cmakeListsTxtPath: ${{ github.workspace }}
          cmakeBuildDirectory: ${{ github.workspace }}/build
          cmakeAppendedArgs: >-
            -A ${{ matrix.platform }}
            -DCMAKE_BUILD_TYPE=${{ matrix.configuration }}
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.runvcpkg.outputs.RUNVCPKG_VCPKG_ROOT_OUT }}/scripts/buildsystems/vcpkg.cmake
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}
          buildWithCMakeArgs: >-
            --config ${{ matrix.configuration }}
            --target install
            --prefix install
